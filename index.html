<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardiology Question Bank</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f7fa;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.section{
    background:white;
    margin-bottom:20px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.section-header{
    background:#0f62fe;
    color:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

.question{
    padding:20px;
    border-bottom:1px solid #eee;
}

.question:last-child{
    border-bottom:none;
}

.question-id{
    color:#666;
    font-size:14px;
    margin-bottom:5px;
}

.subtopic{
    color:#0f62fe;
    font-weight:bold;
    margin-bottom:10px;
}

.difficulty{
    display:inline-block;
    padding:4px 10px;
    border-radius:20px;
    background:#eee;
    margin-bottom:10px;
}

.question-text{
    font-size:18px;
    margin-bottom:15px;
}

.options{
    display:grid;
    gap:8px;
}

.option{
    padding:10px;
    background:#f8f9fc;
    border-radius:8px;
    cursor:pointer;
    transition:.2s;
}

.option:hover{
    background:#eaf1ff;
}

.correct{
    background:#d4edda !important;
}

.wrong{
    background:#f8d7da !important;
}

.answer-box{
    margin-top:15px;
    padding:15px;
    background:#fff9d6;
    border-left:4px solid #ffc107;
    display:none;
}

.stats{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    display:flex;
    gap:20px;
    font-size:18px;
}
</style>
</head>
<body>

<div class="container">

    <h1>Cardiology Question Bank</h1>

    <div class="stats">
        <div>Total Questions: <span id="total">0</span></div>
        <div>Correct: <span id="correctCount">0</span></div>
    </div>

    <div id="content"></div>

</div>

<script>

let correctAnswers = 0;

fetch("./db.json")
.then(res => res.json())
.then(data => {

    let totalQuestions = 0;
    const container = document.getElementById("content");

    data.sections.forEach(section => {

        const sectionDiv = document.createElement("div");
        sectionDiv.className = "section";

        sectionDiv.innerHTML = `
            <div class="section-header">${section.name}</div>
        `;

        section.questions.forEach(q => {

            totalQuestions++;

            const questionDiv = document.createElement("div");
            questionDiv.className = "question";

            let optionsHTML = "";

            Object.entries(q.options).forEach(([key,val])=>{
                optionsHTML += `
                    <div class="option"
                         data-answer="${key}">
                         <b>${key}.</b> ${val}
                    </div>
                `;
            });

            questionDiv.innerHTML = `
                <div class="question-id">${q.id}</div>
                <div class="subtopic">${q.subtopic}</div>
                <div class="difficulty">${q.difficulty}</div>

                <div class="question-text">
                    ${q.question}
                </div>

                <div class="options">
                    ${optionsHTML}
                </div>

                <div class="answer-box">
                    <b>Correct Answer:</b> ${q.correct_answer}
                    <br><br>
                    ${q.explanation}
                </div>
            `;

            const answerBox =
                questionDiv.querySelector(".answer-box");

            questionDiv
                .querySelectorAll(".option")
                .forEach(option => {

                    option.addEventListener("click",()=>{

                        if(questionDiv.dataset.answered)
                            return;

                        questionDiv.dataset.answered = true;

                        const chosen =
                            option.dataset.answer;

                        if(chosen === q.correct_answer){

                            option.classList.add("correct");
                            correctAnswers++;

                            document.getElementById(
                                "correctCount"
                            ).textContent =
                                correctAnswers;

                        }else{

                            option.classList.add("wrong");

                            questionDiv
                            .querySelector(
                                `[data-answer="${q.correct_answer}"]`
                            )
                            .classList.add("correct");
                        }

                        answerBox.style.display = "block";

                    });

                });

            sectionDiv.appendChild(questionDiv);

        });

        container.appendChild(sectionDiv);

    });

    document.getElementById("total")
        .textContent = totalQuestions;

})
.catch(err => {

    document.getElementById("content").innerHTML = `
        <h2>Failed to load db.json</h2>
        <pre>${err}</pre>
    `;

});
</script>

</body>
</html>
